<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">


<title>

Student Score Prediction

</title>


<style>

*{

margin:0;
padding:0;
box-sizing:border-box;

font-family:Arial;

}


body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;


background:linear-gradient(
135deg,
#667eea,
#764ba2
);


}




.container{


background:white;


padding:40px;


border-radius:20px;


box-shadow:0 5px 20px rgba(0,0,0,0.3);


width:450px;


}




h1{


text-align:center;


margin-bottom:30px;


color:#333;


}





label{


font-weight:bold;


display:block;


margin-top:15px;


}



input{


width:100%;

padding:12px;


margin-top:8px;


border-radius:8px;


border:1px solid gray;


}





button{


margin-top:25px;


width:100%;


padding:12px;



background:#667eea;



color:white;



border:none;



border-radius:10px;



font-size:18px;



cursor:pointer;



}





button:hover{


background:#5a67d8;


}



.result{


margin-top:25px;



text-align:center;



font-size:25px;



color:green;



font-weight:bold;



}




</style>


</head>



<body>



<div class="container">



<h1>

🎓 Student Score Prediction

</h1>





<form action="/predict"

method="POST">



<label>

Hours Studied

</label>


<input
type="number"

step="0.1"

name="hours"

required>






<label>

Attendance

</label>



<input
type="number"

name="attendance"

required>






<label>

Sleep Hours

</label>



<input
type="number"

name="sleep"

required>






<label>

Assignments Completed

</label>



<input
type="number"

name="assignments"

required>






<button>

Predict Score

</button>


</form>




{% if prediction %}


<div class="result">

Predicted Score


<br>


{{prediction}}


</div>



{% endif %}





</div>




</body>


</html>
